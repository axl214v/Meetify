
services:
  # ==========================================
  # MySQL Database
  # ==========================================
  db:
    image: mysql:8.0
    container_name: meetify-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-meetify}
      MYSQL_USER: ${DB_USER:-meetify_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-meetify_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - meetify-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ==========================================
  # Backend Server (Node.js)
  # ==========================================
  backend:
    build:
      context: ./src/server_js
      dockerfile: Dockerfile
    container_name: meetify-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      # mediasoup RTC media ports (UDP + TCP fallback for Docker Desktop)
      - "40000-40059:40000-40059/udp"
      - "40000-40059:40000-40059/tcp"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: '0.0.0.0'
      PORT: 3000
      
      # Database
      DB_HOST: db
      DB_USER: ${DB_USER:-meetify_user}
      DB_PASSWORD: ${DB_PASSWORD:-meetify_password}
      DB_NAME: ${DB_NAME:-meetify}
      DB_PORT: 3306
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      
      # URLs
      SERVER_URL: ${SERVER_URL:-http://localhost:3000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      
      # STUN/TURN — points to the bundled coturn container by default
      USE_OWN_STUN_SERVER: ${USE_OWN_STUN_SERVER:-true}
      STUN_SERVER_URL: ${STUN_SERVER_URL:-stun:62.60.186.59:3478}
      TURN_SERVER_URL: ${TURN_SERVER_URL:-turn:62.60.186.59:3478}
      TURN_USERNAME: ${TURN_USERNAME:-meetify}
      TURN_PASSWORD: ${TURN_PASSWORD}
      
      # Conference limits
      MAX_CONFERENCE_PARTICIPANTS: ${MAX_CONFERENCE_PARTICIPANTS:-50}

      # mediasoup SFU — set MEDIASOUP_ANNOUNCED_IP to your public/LAN IP in production
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
      MEDIASOUP_MIN_PORT: ${MEDIASOUP_MIN_PORT:-40000}
      MEDIASOUP_MAX_PORT: ${MEDIASOUP_MAX_PORT:-40059}
      
    volumes:
      # Don't mount src for production, files are copied in Dockerfile
      - server_logs:/app/logs
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meetify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/check-status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # Frontend (Nginx serving static files)
  # ==========================================
  frontend:
    build:
      context: ./src/app
      dockerfile: Dockerfile
    container_name: meetify-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - meetify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # CoTURN STUN/TURN Server
  # ==========================================
  coturn:
    image: coturn/coturn:latest
    container_name: meetify-coturn
    restart: unless-stopped
    # Config is passed as CLI args so Docker Compose substitutes env vars directly.
    # No config file template needed — coturn reads everything from the command line.
    command: >
      -n
      --log-file=stdout
      --external-ip=${COTURN_PUBLIC_IP:-127.0.0.1}
      --listening-port=3478
      --min-port=49152
      --max-port=49200
      --user=${TURN_USERNAME:-meetify}:${TURN_PASSWORD:-change_me_turn_secret}
      --realm=meetify.local
      --lt-cred-mech
      --fingerprint
      --no-cli
      --no-multicast-peers
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"
    networks:
      - meetify-network

# ==========================================
# Networks
# ==========================================
networks:
  meetify-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  db_data:
    driver: local
  server_logs:
    driver: local
  uploads_data:
    driver: local
  backups_data:
    driver: local