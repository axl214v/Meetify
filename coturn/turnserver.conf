# Meetify coturn configuration
# https://github.com/coturn/coturn/wiki/turnserver

# Listening port (STUN + TURN)
listening-port=3478
tls-listening-port=5349

# Bind to all interfaces
listening-ip=0.0.0.0

# Public IP of your server — set COTURN_PUBLIC_IP in .env
# If unset, defaults to 127.0.0.1 (local dev only)
external-ip=${COTURN_PUBLIC_IP:-127.0.0.1}

# Relay port range (must match docker-compose port mapping)
min-port=49152
max-port=49200

# Authentication
user=${TURN_USERNAME:-meetify}:${TURN_PASSWORD}
realm=meetify.local

# Security
no-multicast-peers
no-cli
fingerprint
lt-cred-mech

# Logging
log-file=stdout
verbose
