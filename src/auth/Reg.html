<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meetify - Регистрация</title>
  <link rel="stylesheet" href="auth_reg.css">
  <link rel="icon" href="/meetify/assets/logo.png">
  <h1>Регистрация</h1>
  <h2>Форма Регистрации</h2>
</head>
<body>
  <p>Имя:</p>
  <input maxleght="36" placeholder='Иван' name="name" id="name" required = 'Пожалуйста заполните это поле.'>
  <p>Почта:</p>
  <input maxleght="36" placeholder='example@email.com' name="email" id="email" required>
  <p>Пароль:</p>
  <input maxleght="36" name="password" id="password" required>
  <button name = "subm" id="submit">Зарегестрироваться</button>
  <div id = "auth">
    <a>Уже зарегестрированы?</a>
    <button id = "authb"><a href = 'Auth.html'>Авторизуйтесь!</a></button>
  </div>
  <script src = reg.js></script>
  <noscript>Извините, ваш браузер не поддерживает JavaScript.</noscript>
</body>
</html>
