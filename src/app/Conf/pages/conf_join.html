<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Conference - Meetify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/brand.css">
    <link rel="stylesheet" href="/styles/conf.css">
    <link rel="stylesheet" href="/styles/theme-additions.css">
    <link rel="icon" href="/assets/logo.png">
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
</head>
<body>
    <nav class="brand-nav">
        <a class="brand-nav-logo" href="/">
            <img src="/assets/logo.png" alt="Meetify">
        </a>
        <div class="brand-nav-right">
            <button class="btn btn-ghost" onclick="window.location.href='conf.html'">← Back to Dashboard</button>
            <button class="brand-theme-btn" id="themeToggleBtn" aria-label="Toggle theme">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </nav>

    <main>
        <div class="conference-form">
            <h3>🔗 Enter Conference Details</h3>
            
            <form id="joinConferenceForm">
                <!-- Conference ID -->
                <div class="form-group">
                    <label for="conferenceId" class="conference-label">Conference ID *</label>
                    <input 
                        type="text" 
                        id="conferenceId" 
                        name="conferenceId"
                        placeholder="Enter conference ID (e.g., 12345)" 
                        required
                        autocomplete="off"
                    >
                    <small class="input-hint">Enter the ID provided by the conference host</small>
                </div>

                <!-- Password Field (hidden by default) -->
                <div id="passwordField" class="form-group" style="display: none;">
                    <label for="password" class="conference-label">Password *</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="Enter conference password"
                    >
                    <small class="input-hint">This conference is password protected</small>
                </div>

                <!-- Conference Preview (shown after ID entered) -->
                <div id="conferencePreview" class="conference-preview" style="display: none;">
                    <h4>📹 Conference Details</h4>
                    <div class="preview-content">
                        <div class="preview-item">
                            <span class="preview-label">Name:</span>
                            <span id="previewName">-</span>
                        </div>
                        <div class="preview-item">
                            <span class="preview-label">Host:</span>
                            <span id="previewHost">-</span>
                        </div>
                        <div class="preview-item">
                            <span class="preview-label">Participants:</span>
                            <span id="previewParticipants">-</span>
                        </div>
                        <div class="preview-item">
                            <span class="preview-label">Status:</span>
                            <span id="previewStatus" class="status-badge">-</span>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="button-container">
                    <button type="button" id="checkBtn" onclick="checkConference()">
                        Check Conference
                    </button>
                    <button type="button" id="joinBtn" style="display: none;">
                        Join Conference
                    </button>
                    <button type="button" class="secondary" onclick="window.location.href='conf.html'">
                        Cancel
                    </button>
                </div>
            </form>

            <!-- Info Messages -->
            <div id="errorMessage" class="error-message" style="display: none;">
                <strong>⚠️ Error:</strong>
                <span id="errorText"></span>
            </div>

            <div id="successMessage" class="info-message" style="display: none;">
                <strong>✅ Success:</strong>
                <span id="successText"></span>
            </div>
        </div>

        <!-- Quick Access to Recent Conferences -->
        <div class="recent-conferences">
            <h3>🕒 Recently Joined</h3>
            <div id="recentList" class="recent-list">
                <p class="loading-text">Loading recent conferences...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Meetify</p>
    </footer>

    <script src="/js/theme.js"></script>
    <script src="/Conf/js/conf_utils.js"></script>
    <script src="/Conf/js/conf_join.js"></script>
    <script src="/err/error-logger.js"></script>
</body>
</html>
