<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Room - Meetify</title>
    <link rel="stylesheet" href="../../assets/fonts/fonts.css">
    <link rel="icon" href="/assets/logo-mark.png">
    <style>
        /* ============================================ */
        /* Variables                                    */
        /* ============================================ */

        :root {
            --room-bg:      #020c1a;
            --room-surface: #081828;
            --room-card:    #0d2040;
            --room-border:  rgba(37,99,235,0.15);
            --room-text:    #e8f0fe;
            --room-muted:   #7a96be;
            --accent:       #2563eb;
            --accent-2:     #0ea5e9;
            --success:      #22c55e;
            --danger:       #ef4444;
            --warn:         #f59e0b;
            --purple:       #8b5cf6;
            --cyan:         #06b6d4;
            --grad:         linear-gradient(135deg,#2563eb 0%,#0ea5e9 100%);
            --grad-text:    linear-gradient(135deg,#60a5fa 0%,#22d3ee 100%);
            --glow:         rgba(37,99,235,0.30);
            --font:         'Outfit', sans-serif;
            --font-mono:    'JetBrains Mono', monospace;
        }

        /* ============================================ */
        /* Base                                         */
        /* ============================================ */

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--room-bg);
            color: var(--room-text);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================ */
        /* Room Layout                                  */
        /* ============================================ */

        .room-container {
            display: grid;
            grid-template-rows: 60px 1fr 80px;
            height: 100vh;
        }

        /* ============================================ */
        /* Header                                       */
        /* ============================================ */

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            background: rgba(6,18,40,0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--room-border);
            position: relative;
            z-index: 10;
        }
        /* hairline gradient accent under header — the "precision" touch */
        .room-header::after {
            content: '';
            position: absolute;
            left: 0; right: 0; bottom: -1px;
            height: 1px;
            background: linear-gradient(90deg,
                transparent, rgba(37,99,235,0.55),
                rgba(14,165,233,0.45), transparent);
            pointer-events: none;
        }

        .room-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .room-logo {
            display: flex;
            align-items: center;
            height: 100%;
        }
        .room-logo img {
            height: 26px;
            width: auto;
            display: block;
        }

        .room-divider {
            width: 1px;
            height: 20px;
            background: var(--room-border);
        }

        .room-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--room-text);
            max-width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .room-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.8rem;
            color: var(--room-muted);
            font-family: var(--font-mono);
        }

        .meta-chip {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: var(--room-card);
            border: 1px solid var(--room-border);
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
        }

        .meta-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ============================================ */
        /* Video Grid                                   */
        /* ============================================ */

        .video-area {
            background: var(--room-bg);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        /* Static dotted grid backdrop — same motif as the landing hero,
           but no animation/blur so it never competes with video decode */
        .video-area::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(37,99,235,0.10) 1px, transparent 1px);
            background-size: 28px 28px;
            -webkit-mask-image: radial-gradient(ellipse 90% 70% at 50% 0%, #000, transparent 78%);
            mask-image: radial-gradient(ellipse 90% 70% at 50% 0%, #000, transparent 78%);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 8px;
            padding: 8px;
            flex: 1;
            min-height: 0;
            align-content: start;
            overflow-y: auto;
            position: relative;
            z-index: 1;
        }

        /* Single participant — full width */
        .video-grid:has(.video-container:only-child) {
            grid-template-columns: 1fr;
        }

        .video-container {
            position: relative;
            background: var(--room-card);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 1px solid var(--room-border);
            transition: border-color 0.2s;
        }

        .video-container:hover {
            border-color: rgba(255,255,255,0.12);
        }

        .video-container.speaking {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Camera off placeholder */
        .video-placeholder {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--room-card);
        }

        .video-container.cam-off .video-placeholder { display: flex; }
        .video-container.cam-off video { opacity: 0; }

        .placeholder-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        /* Video overlay */
        .video-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.75rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .overlay-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Small avatar in video overlay */
        .overlay-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .overlay-avatar-initials {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .participant-name {
            color: white;
            font-size: 0.82rem;
            font-weight: 600;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        .overlay-right {
            display: flex;
            gap: 0.3rem;
        }

        .status-pill {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .status-pill.muted { border-color: rgba(239,68,68,0.4); }

        /* ============================================ */
        /* Controls Bar                                 */
        /* ============================================ */

        .controls-bar {
            background: rgba(6,18,40,0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-top: 1px solid var(--room-border);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }
        .controls-bar::before {
            content: '';
            position: absolute;
            left: 0; right: 0; top: -1px;
            height: 1px;
            background: linear-gradient(90deg,
                transparent, rgba(37,99,235,0.55),
                rgba(14,165,233,0.45), transparent);
            pointer-events: none;
        }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .ctrl-sep {
            width: 1px;
            height: 32px;
            background: var(--room-border);
            margin: 0 0.25rem;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid var(--room-border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.18s;
            background: var(--room-card);
            color: var(--room-text);
            position: relative;
            flex-shrink: 0;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-1px);
        }

        .control-btn:active { transform: translateY(0); }

        /* Active states */
        .control-btn.mic        { background: rgba(59,130,246,0.15);  border-color: rgba(59,130,246,0.3); }
        .control-btn.mic.muted  { background: rgba(239,68,68,0.15);   border-color: rgba(239,68,68,0.3); }
        .control-btn.video      { background: rgba(59,130,246,0.15);  border-color: rgba(59,130,246,0.3); }
        .control-btn.video.off  { background: rgba(239,68,68,0.15);   border-color: rgba(239,68,68,0.3); }
        .control-btn.screen     { background: rgba(16,185,129,0.12);  border-color: rgba(16,185,129,0.25); }
        .control-btn.screen.sharing { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.3); }
        .control-btn.participants { background: rgba(139,92,246,0.12); border-color: rgba(139,92,246,0.25); }
        .control-btn.chat       { background: rgba(6,182,212,0.12);   border-color: rgba(6,182,212,0.25); }

        /* Leave button */
        .control-btn.leave {
            width: auto;
            padding: 0 1.5rem;
            border-radius: 10px;
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.3);
            color: #fca5a5;
            font-size: 0.88rem;
            font-weight: 600;
            gap: 0.4rem;
        }

        .control-btn.leave:hover {
            background: rgba(239,68,68,0.25);
            box-shadow: 0 4px 16px rgba(239,68,68,0.2);
        }

        /* Badge */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border: 2px solid var(--room-surface);
        }

        /* ============================================ */
        /* Sidebar                                      */
        /* ============================================ */

        .sidebar {
            position: fixed;
            right: -380px;
            top: 0;
            width: 340px;
            height: 100vh;
            background: var(--room-surface);
            border-left: 1px solid var(--room-border);
            transition: right 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open { right: 0; }

        .sidebar-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--room-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .sidebar-header h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--room-text);
        }

        .close-sidebar {
            background: var(--room-card);
            border: 1px solid var(--room-border);
            color: var(--room-muted);
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.15s;
            flex-shrink: 0;
            min-height: auto;
            padding: 0;
        }

        .close-sidebar:hover {
            color: var(--room-text);
            border-color: rgba(255,255,255,0.12);
            transform: none;
            box-shadow: none;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }

        /* ============================================ */
        /* Participants List                            */
        /* ============================================ */

        .participant-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.9rem;
            background: var(--room-card);
            border: 1px solid var(--room-border);
            border-radius: 10px;
            margin-bottom: 0.5rem;
            transition: border-color 0.15s;
        }

        .participant-item:hover { border-color: rgba(255,255,255,0.1); }

        /* Avatar with image support */
        .participant-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .participant-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .participant-avatar-initials {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: white;
        }

        .participant-info { flex: 1; min-width: 0; }

        .participant-info strong {
            display: block;
            color: var(--room-text);
            font-size: 0.88rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .participant-info small {
            color: var(--room-muted);
            font-size: 0.75rem;
        }

        .participant-media {
            display: flex;
            gap: 0.25rem;
            flex-shrink: 0;
        }

        .media-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: var(--room-surface);
            border: 1px solid var(--room-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
        }

        .media-icon.off {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.2);
        }

        /* ============================================ */
        /* Moderation menu                              */
        /* ============================================ */

        .mod-menu-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .mod-menu-btn {
            background: none;
            border: none;
            color: var(--room-muted, #64748b);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 2px 6px;
            border-radius: 6px;
            line-height: 1;
            transition: background 0.15s, color 0.15s;
        }

        .mod-menu-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--room-text, #f1f5f9);
        }

        .mod-menu {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 4px);
            background: #1c2540;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            min-width: 180px;
            z-index: 1000;
            overflow: hidden;
        }

        .mod-menu button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: #cbd5e1;
            padding: 0.6rem 1rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.12s;
        }

        .mod-menu button:hover {
            background: rgba(255,255,255,0.07);
            color: #f1f5f9;
        }

        .mod-menu button.danger {
            color: #fca5a5;
        }

        .mod-menu button.danger:hover {
            background: rgba(239,68,68,0.12);
        }

        /* ============================================ */
        /* Chat                                         */
        /* ============================================ */

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .chat-message {
            padding: 0.65rem 0.9rem;
            background: var(--room-card);
            border: 1px solid var(--room-border);
            border-radius: 10px;
        }

        .chat-message.own {
            background: rgba(59,130,246,0.08);
            border-color: rgba(59,130,246,0.15);
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .message-sender {
            font-size: 0.8rem;
            font-weight: 600;
            color: #60a5fa;
        }

        .chat-message.own .message-sender { color: #818cf8; }

        .message-time {
            font-size: 0.7rem;
            color: var(--room-muted);
            font-family: var(--font-mono);
        }

        .message-content {
            font-size: 0.88rem;
            color: var(--room-text);
            line-height: 1.5;
            word-break: break-word;
            margin: 0;
        }

        .chat-input-container {
            padding: 0.75rem;
            border-top: 1px solid var(--room-border);
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .chat-input-container input {
            flex: 1;
            background: var(--room-card);
            border: 1px solid var(--room-border);
            color: var(--room-text);
            padding: 0.6rem 0.9rem;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 0.88rem;
            margin-bottom: 0;
            transition: border-color 0.15s;
        }

        .chat-input-container input:focus {
            outline: none;
            border-color: rgba(59,130,246,0.4);
        }

        .chat-input-container input::placeholder { color: var(--room-muted); }

        #sendBtn {
            background: var(--grad);
            border: none;
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: var(--font);
            min-height: auto;
            box-shadow: 0 0 14px var(--glow);
            transition: all 0.15s;
        }

        #sendBtn:hover {
            background: var(--grad);
            transform: none;
            box-shadow: 0 0 20px var(--glow);
            opacity: 0.95;
        }

        /* ============================================ */
        /* Scrollbar                                    */
        /* ============================================ */

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ============================================ */
        /* Pin / Spotlight                              */
        /* ============================================ */

        .pin-btn {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            cursor: pointer;
            color: white;
            opacity: 0;
            transition: opacity 0.15s;
            padding: 0;
            min-height: unset;
            line-height: 1;
            flex-shrink: 0;
        }

        .video-container:hover .pin-btn { opacity: 1; }

        .video-container.pinned .pin-btn {
            opacity: 1;
            background: rgba(59,130,246,0.75);
            border-color: rgba(59,130,246,0.9);
        }

        .video-container.pinned {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.35);
        }

        /* Filmstrip section */
        .filmstrip-section {
            flex-shrink: 0;
            background: var(--room-surface);
            border-top: 1px solid var(--room-border);
            position: relative;
            z-index: 1;
        }

        .filmstrip-section.hidden { display: none; }

        .filmstrip-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.3rem 0.75rem;
        }

        .filmstrip-label {
            font-size: 0.72rem;
            color: var(--room-muted);
            font-family: var(--font-mono);
        }

        .filmstrip-toggle-btn {
            background: none;
            border: 1px solid var(--room-border);
            color: var(--room-muted);
            border-radius: 6px;
            font-size: 0.7rem;
            padding: 0.15rem 0.55rem;
            cursor: pointer;
            min-height: unset;
            font-family: var(--font);
            transition: all 0.15s;
        }

        .filmstrip-toggle-btn:hover {
            border-color: rgba(255,255,255,0.15);
            color: var(--room-text);
            transform: none;
            box-shadow: none;
        }

        .filmstrip {
            height: 120px;
            display: flex;
            align-items: stretch;
            gap: 6px;
            padding: 0 8px 8px;
            overflow-x: auto;
        }

        .filmstrip-section.strip-collapsed .filmstrip { display: none; }

        .filmstrip .video-container {
            width: 190px;
            min-width: 150px;
            flex-shrink: 0;
            height: 100%;
            aspect-ratio: unset;
            border-radius: 8px;
            cursor: pointer;
        }

        .filmstrip .video-container .pin-btn { opacity: 0.65; }
        .filmstrip .video-container:hover .pin-btn { opacity: 1; }

        /* ============================================ */
        /* Camera flip state                           */
        /* ============================================ */

        #localVideo.flip-h { transform: scaleX(-1); }
        #localVideo.flip-v { transform: scaleY(-1); }
        #localVideo.flip-h.flip-v { transform: scaleX(-1) scaleY(-1); }

        .control-btn.flip-h.active,
        .control-btn.flip-v.active {
            background: rgba(14,165,233,0.15);
            border-color: rgba(14,165,233,0.35);
        }

        /* ============================================ */
        /* Mobile                                       */
        /* ============================================ */

        @media (max-width: 768px) {
            .room-container { grid-template-rows: 52px 1fr 70px; }

            .video-grid { grid-template-columns: 1fr; gap: 6px; padding: 6px; }

            .sidebar { width: 100%; right: -100%; }

            .controls-bar { gap: 0.5rem; padding: 0 1rem; }

            .control-btn { width: 42px; height: 42px; font-size: 1rem; }

            .control-btn.leave { padding: 0 1rem; font-size: 0.8rem; }

            .room-meta { display: none; }
        }

        /* Phones: wrap controls into multiple rows so nothing overflows */
        @media (max-width: 600px) {
            .room-container { grid-template-rows: 52px 1fr auto; }

            .controls-bar {
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
                padding: 8px 10px;
                height: auto;
            }

            .ctrl-sep { display: none; }
            .ctrl-group { gap: 6px; }

            .control-btn { width: 40px; height: 40px; font-size: 0.95rem; border-radius: 10px; }

            .control-btn.leave { padding: 0 14px; font-size: 0.8rem; width: auto; }

            /* Keep logo visible but hide title to save space */
            .room-title { display: none; }
            .room-divider { display: none; }
        }

        @media (max-width: 400px) {
            .control-btn { width: 36px; height: 36px; font-size: 0.88rem; }
            .control-btn.leave { padding: 0 10px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="room-container">

    <!-- Header -->
    <header class="room-header">
        <div class="room-header-left">
            <span class="room-logo"><img src="/assets/logo.png" alt="Meetify"></span>
            <div class="room-divider"></div>
            <span class="room-title" id="conferenceName">Loading...</span>
        </div>
        <div class="room-header-right">
            <div class="room-meta">
                <div class="meta-chip">
                    <span class="dot"></span>
                    <span id="participantCount">0</span> participants
                </div>
                <div class="meta-chip">
                    <span id="roomTimer">00:00</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Video Grid -->
    <div class="video-area" id="videoArea">
        <div class="video-grid" id="videoGrid">

            <!-- Local video -->
            <div class="video-container" id="localVideoContainer" data-user-id="local">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-placeholder">
                    <div class="placeholder-avatar" id="localPlaceholder">?</div>
                </div>
                <div class="video-overlay">
                    <div class="overlay-left">
                        <div class="overlay-avatar-initials" id="localOverlayAvatar">?</div>
                        <span class="participant-name">You</span>
                    </div>
                    <div class="overlay-right">
                        <div class="status-pill" id="localMicStatus">🎤</div>
                        <div class="status-pill" id="localVideoStatus">📹</div>
                        <button class="pin-btn" id="localPinBtn" title="Pin (spotlight)">📍</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- Filmstrip: unpinned participants shown here in spotlight mode -->
        <div class="filmstrip-section hidden" id="filmstripSection">
            <div class="filmstrip-header">
                <span class="filmstrip-label" id="filmstripLabel">0 others</span>
                <button class="filmstrip-toggle-btn" id="filmstripToggleBtn" onclick="toggleStrip()">Hide</button>
            </div>
            <div class="filmstrip" id="filmstrip"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-bar">
        <div class="ctrl-group">
            <button class="control-btn mic" id="toggleMic" title="Toggle Microphone">🎤</button>
            <button class="control-btn video" id="toggleVideo" title="Toggle Camera">📹</button>
            <button class="control-btn flip-h" id="flipHBtn" title="Flip camera horizontally (mirror)">↔️</button>
            <button class="control-btn flip-v" id="flipVBtn" title="Flip camera vertically">↕️</button>
            <button class="control-btn screen" id="toggleScreen" title="Share Screen">🖥️</button>
        </div>

        <div class="ctrl-sep"></div>

        <div class="ctrl-group">
            <button class="control-btn participants" id="toggleParticipants" title="Participants">👥</button>
            <button class="control-btn chat" id="toggleChat" title="Chat">
                💬
                <span class="notification-badge" id="chatBadge" style="display:none;">0</span>
            </button>
        </div>

        <div class="ctrl-sep"></div>

        <button class="control-btn leave" id="leaveBtn">
            ✕ Leave
        </button>
    </div>

    <!-- Participants Sidebar -->
    <div class="sidebar" id="participantsSidebar">
        <div class="sidebar-header">
            <h3>👥 Participants</h3>
            <button class="close-sidebar" onclick="closeSidebar('participants')">✕</button>
        </div>
        <div class="sidebar-content" id="participantsList">
            <!-- Loaded dynamically -->
        </div>
    </div>

    <!-- Chat Sidebar -->
    <div class="sidebar" id="chatSidebar">
        <div class="sidebar-header">
            <h3>💬 Chat</h3>
            <button class="close-sidebar" onclick="closeSidebar('chat')">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- Messages appear here -->
        </div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Type a message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
<script src="/Conf/js/conf_utils.js"></script>
<script src="/Conf/components/chat.js"></script>
<script src="/js/theme.js"></script>
<!-- mediasoup-client for SFU (Group) calls — async ESM, conf_room.js waits for 'mediasoup-ready' event -->
<script type="module">
    try {
        const { Device } = await import('https://esm.sh/mediasoup-client@3');
        window.MediasoupDevice = Device;
    } catch (e) {
        console.warn('[mediasoup] Client load failed:', e.message);
    } finally {
        window.dispatchEvent(new Event('mediasoup-ready'));
    }
</script>
<script src="/Conf/js/conf_room.js"></script>
<script src="/err/error-logger.js"></script>
</body>
</html>
