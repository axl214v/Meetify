<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Conferences - Meetify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/brand.css">
    <link rel="stylesheet" href="/styles/conf.css">
    <link rel="stylesheet" href="/styles/theme-additions.css">
    <link rel="icon" href="/assets/logo.png">
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
</head>
<body>
    <nav class="brand-nav">
        <a class="brand-nav-logo" href="/">
            <img src="/assets/logo.png" alt="Meetify">
        </a>
        <div class="brand-nav-right">
            <button class="btn btn-ghost" onclick="window.location.href='/'">← Home</button>
            <button class="btn btn-ghost" onclick="window.location.href='conf_join.html'">🔗 Join</button>
            <button class="btn btn-primary" onclick="window.location.href='conf_create.html'">➕ Create Conference</button>
            <button class="brand-theme-btn" id="themeToggleBtn" aria-label="Toggle theme">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </nav>

    <main>
        <!-- User Info -->
        <div class="user-info" id="userInfo">
            <div class="status-indicator"></div>
                <span id="userName">Loading...</span>
                <a href="/profile/profile.html" style="margin-left:auto;font-size:0.82rem;">
                    ⚙️ Profile
                </a>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">
                    All Conferences
                </button>
                <button class="filter-tab" data-filter="host">
                    My Hosted
                </button>
                <button class="filter-tab" data-filter="participant">
                    Joined
                </button>
            </div>

            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 Search conferences..."
                >
            </div>
        </div>

        <!-- Conferences List -->
        <div class="conferences-container">
            <div id="loadingIndicator" class="loading-state">
                <div class="spinner"></div>
                <p>Loading conferences...</p>
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📭</div>
                <h3>No conferences found</h3>
                <p>Create your first conference or join an existing one!</p>
                <div class="button-container">
                    <button onclick="window.location.href='conf_create.html'">
                        Create Conference
                    </button>
                    <button onclick="window.location.href='conf_join.html'" class="secondary">
                        Join Conference
                    </button>
                </div>
            </div>

            <div id="conferencesList" class="conferences-grid">
                <!-- Conferences will be loaded here dynamically -->
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination" style="display: none;">
            <button id="prevPage" class="secondary" disabled>← Previous</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextPage" class="secondary">Next →</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Meetify</p>
    </footer>

    <!-- Edit Conference Modal -->
    <div id="editModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Edit Conference</h2>
                <button class="modal-close" onclick="closeEditModal()">✕</button>
            </div>
            <form id="editForm" class="modal-form">
                <input type="hidden" id="editConfId">

                <div class="form-group">
                    <label for="editName">Name <span class="required">*</span></label>
                    <input type="text" id="editName" maxlength="100" required>
                </div>

                <div class="form-group">
                    <label for="editDescription">Description</label>
                    <textarea id="editDescription" rows="3" maxlength="500"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="editMaxParticipants">Max Participants</label>
                        <input type="number" id="editMaxParticipants" min="2" max="100">
                    </div>
                    <div class="form-group form-group--checkbox">
                        <label class="checkbox-label">
                            <input type="checkbox" id="editIsPublic">
                            Public conference
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="editStartTime">Start Time</label>
                        <input type="datetime-local" id="editStartTime">
                    </div>
                    <div class="form-group">
                        <label for="editEndTime">End Time</label>
                        <input type="datetime-local" id="editEndTime">
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="editChangePassword" onchange="togglePasswordField()">
                        Change password
                    </label>
                </div>
                <div class="form-group" id="editPasswordGroup" style="display:none;">
                    <label for="editPassword">New Password <span class="field-hint">(leave empty to remove)</span></label>
                    <input type="password" id="editPassword" maxlength="100" placeholder="Leave empty to remove password">
                </div>

                <div class="modal-actions">
                    <button type="button" class="secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" id="editSubmitBtn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/Conf/js/conf_utils.js"></script>
    <script src="/Conf/js/conf.js"></script>
    <script src="/err/error-logger.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/js/notifications.js"></script>
</body>
</html>
