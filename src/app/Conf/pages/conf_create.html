<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Conference - Meetify</title>
    <link rel="stylesheet" href="/styles/conf.css">
    <link rel="stylesheet" href="/styles/theme-additions.css">
    <link rel="icon" href="/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        .mode-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 6px;
        }
        .mode-card {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border: 1.5px solid var(--border, rgba(255,255,255,0.08));
            border-radius: 12px;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
            background: transparent;
        }
        .mode-card:hover { border-color: var(--accent, #3b82f6); }
        .mode-card--active {
            border-color: var(--accent, #3b82f6);
            background: rgba(59,130,246,0.08);
        }
        .mode-card-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
        .mode-card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .mode-card-desc  { font-size: 11px; line-height: 1.5; opacity: 0.65; }
    </style>
</head>
<body>
    <header>
        <h1>Create New Conference</h1>
        <button type="button" id="backBtn" class="secondary">Back to Dashboard</button>
    </header>
    <main>
        <div class="conference-form">
            <h3>📹 Conference Details</h3>
            
            <form id="createConferenceForm">
                <!-- Mode selector -->
                <div class="form-group">
                    <label class="conference-label">Call Type</label>
                    <div class="mode-cards">
                        <label class="mode-card mode-card--active" id="modeCardP2p">
                            <input type="radio" name="mode" id="modeP2p" value="p2p" checked hidden>
                            <div class="mode-card-icon">🔒</div>
                            <div class="mode-card-body">
                                <div class="mode-card-title">Private call</div>
                                <div class="mode-card-desc">End-to-end · max 8 people<br>Media never touches the server</div>
                            </div>
                        </label>
                        <label class="mode-card" id="modeCardSfu">
                            <input type="radio" name="mode" id="modeSfu" value="sfu" hidden>
                            <div class="mode-card-icon">📡</div>
                            <div class="mode-card-body">
                                <div class="mode-card-title">Group call</div>
                                <div class="mode-card-desc">Server-powered · up to 100 people<br>Scales to large audiences</div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Conference Name -->
                <div class="form-group">
                    <label for="name" class="conference-label">Conference Name *</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name"
                        placeholder="Enter conference name" 
                        maxlength="255"
                        required
                    >
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="description" class="conference-label">Description</label>
                    <textarea 
                        id="description" 
                        name="description"
                        placeholder="Brief description (optional)"
                        maxlength="1000"
                        rows="3"
                    ></textarea>
                </div>

                <!-- Max Participants -->
                <div class="form-group">
                    <label for="maxParticipants" class="conference-label">Max Participants</label>
                    <input 
                        type="number" 
                        id="maxParticipants" 
                        name="maxParticipants"
                        placeholder="Leave empty for unlimited"
                        min="2"
                        max="1000"
                    >
                </div>

                <!-- Settings Section -->
                <div class="settings-section">
                    <h4>⚙️ Settings</h4>
                    
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="isPublic" checked>
                            <span>Make conference public</span>
                        </label>
                    </div>

                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="requirePassword">
                            <span>Require password to join</span>
                        </label>
                    </div>

                    <div id="passwordField" style="display: none;">
                        <label for="password" class="conference-label">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="Enter password"
                            minlength="4"
                        >
                    </div>
                </div>

                <!-- Schedule Section (Optional) -->
                <div class="settings-section">
                    <h4>📅 Schedule (Optional)</h4>
                    
                    <div class="form-group">
                        <label for="startTime" class="conference-label">Start Time</label>
                        <input 
                            type="datetime-local" 
                            id="startTime" 
                            name="startTime"
                        >
                    </div>

                    <div class="form-group">
                        <label for="endTime" class="conference-label">End Time</label>
                        <input 
                            type="datetime-local" 
                            id="endTime" 
                            name="endTime"
                        >
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="button-container">
                    <button type="submit" id="submitBtn">
                        Create Conference
                    </button>
                    <button type="button" id="cancelBtn" class="secondary">Cancel</button>
                </div>
            </form>

            <!-- Created Conference Info (hidden initially) -->
            <div id="conferenceInfo" class="info-message" style="display: none;">
                <h4>✅ Conference Created!</h4>
                <p>Conference ID: <strong id="conferenceId"></strong></p>
                <button type="button" id="copyBtn">Copy ID</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Meetify</p>
    </footer>

    <script src="/js/theme.js"></script>
    <script src="/Conf/js/conf_utils.js"></script>
    <script src="/Conf/js/conf_create.js"></script>
    <script src="/err/error-logger.js"></script>
</body>
</html>
