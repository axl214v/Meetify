<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Meetify</title>
    <script>
        (function() {
            const t = localStorage.getItem('meetify-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <link rel="stylesheet" href="/styles/auth_reg.css">
    <link rel="icon" href="/assets/logo.png">
</head>
<body>

    <a class="auth-back" href="/auth/Auth.html">← Sign in</a>
    <button class="auth-theme-toggle" id="themeToggleBtn" title="Switch theme">☀️</button>

    <div class="auth-page">

        <div class="auth-brand">
            <span class="auth-brand-logo">🎥</span>
            <span class="auth-brand-name">Meetify</span>
        </div>

        <div class="auth-card">
            <h1 class="auth-card-title">Forgot password?</h1>
            <p class="auth-card-sub">Enter your email and we'll send you a reset link</p>

            <!-- Request form -->
            <div id="requestForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="you@example.com"
                        maxlength="100"
                        autocomplete="email"
                        required
                    >
                </div>
                <button class="auth-submit" id="submitBtn">Send Reset Link</button>
                <div class="auth-message" id="resetMessage"></div>
            </div>

            <!-- Success state -->
            <div id="successBlock" style="display:none;">
                <div class="reset-success-block">
                    <div class="reset-icon">📧</div>
                    <h3>Check your email</h3>
                    <p>If <strong id="sentToEmail">—</strong> is registered, a reset link is on its way.</p>
                    <p class="reset-hint">The link expires in <strong>1 hour</strong>. Check your spam folder if you don't see it.</p>
                </div>
            </div>

            <div class="auth-footer">
                <div class="auth-footer-row">
                    <span>Remembered your password?</span>
                    <button class="auth-footer-btn" onclick="window.location.href='/auth/Auth.html'">Sign in</button>
                </div>
            </div>
        </div>

        <div class="page-footer">
            <p>© 2025 Meetify · <a href="/">Home</a></p>
        </div>
    </div>

    <style>
        .reset-success-block { text-align: center; padding: 0.5rem 0 1rem; }
        .reset-icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .reset-success-block h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
        .reset-success-block p { font-size: 0.88rem; color: var(--text-2); margin-bottom: 0.5rem; }
        .reset-success-block strong { color: var(--text); }
        .reset-hint { font-size: 0.8rem !important; color: var(--text-3) !important; }
    </style>

    <script src="/js/theme.js"></script>
    <script src="/js/resetpass.js"></script>
    <script src="/err/error-logger.js"></script>
</body>
</html>
