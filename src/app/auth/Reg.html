<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetify - Registration</title>
  <link rel="stylesheet" href="/styles/auth_reg.css">
  <link rel="icon" href="/assets/logo.png">
</head>
<body>
  <header>
    <h1>Registration</h1>
  </header>
  
  <main>
    <section>
      <h2>Registration Form</h2>
      <form id="reg-form">
        <div>
          <label for="name">Name:</label>
          <input type="text" maxlength="36" placeholder="Ivan" name="name" id="name" required>
        </div>
        <div>
          <label for="email">Email:</label>
          <input type="email" maxlength="36" placeholder="example@email.com" name="email" id="email" required>
        </div>
        <div>
          <label for="password">Password:</label>
          <input type="password" id="password" placeholder="Password">
        </div>
        <div>
          <button type="submit" id="submit">Register</button>
        </div>
      </form>
    </section>
    
    <section class="auth-links">
      <div>
        <a href="/auth/Auth.html">Already registered?</a>
        <button id="authb">Login!</button>
      </div>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Meetify. All rights reserved.</p>
  </footer>
  
  <script src="/js/reg.js"></script>
  <script src="/err/error-logger.js"></script>
  <noscript>Sorry, your browser does not support JavaScript.</noscript>
</body>
</html>
