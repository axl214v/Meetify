<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Meetify</title>
    <link rel="stylesheet" href="/styles/auth_reg.css">
    <link rel="icon" href="/assets/logo.png">
</head>
<body>

    <!-- Back to home -->
    <a class="auth-back" href="/">← Home</a>

    <!-- Theme toggle -->
    <button class="auth-theme-toggle" id="themeToggleBtn" title="Switch theme">☀️</button>

    <div class="auth-page">

        <!-- Brand -->
        <div class="auth-brand">
            <span class="auth-brand-logo">🎥</span>
            <span class="auth-brand-name">Meetify</span>
        </div>

        <!-- Card -->
        <div class="auth-card">
            <h1 class="auth-card-title">Create account</h1>
            <p class="auth-card-sub">Join Meetify — it's free</p>

            <div class="auth-form">
                <div class="form-group">
                    <label for="name">Display name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Ivan Petrov"
                        maxlength="100"
                        autocomplete="name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        maxlength="100"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Min 8 characters"
                        maxlength="100"
                        autocomplete="new-password"
                        required
                    >
                    <span id="password-strength"></span>
                </div>

                <div class="form-group form-group-consent">
                    <label class="consent-label">
                        <input type="checkbox" id="ageConsent" name="ageConsent">
                        <span class="consent-box"></span>
                        <span class="consent-text">I confirm that I am at least <strong>16 years old</strong></span>
                    </label>
                </div>

                <div class="form-group form-group-consent">
                    <label class="consent-label">
                        <input type="checkbox" id="consent" name="consent">
                        <span class="consent-box"></span>
                        <span class="consent-text">
                            I agree to the
                            <a href="/legal/terms.html" target="_blank">Terms of Service</a>
                            and
                            <a href="/legal/privacy.html" target="_blank">Privacy Policy</a>
                        </span>
                    </label>
                </div>

                <button class="auth-submit" id="submit">Create Account</button>

                <!-- Inline message instead of alert() -->
                <div class="auth-message" id="authMessage"></div>
            </div>

            <!-- Footer links -->
            <div class="auth-footer">
                <div class="auth-footer-row">
                    <span>Already have an account?</span>
                    <button class="auth-footer-btn" id="authb">Sign in</button>
                </div>
            </div>
        </div>

        <div class="page-footer">
            <p>© 2025 Meetify · <a href="/">Home</a></p>
        </div>

    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/reg.js"></script>
    <script src="/err/error-logger.js"></script>
</body>
</html>
