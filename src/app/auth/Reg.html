<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Meetify</title>
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
    <link rel="stylesheet" href="/styles/brand.css">
    <link rel="stylesheet" href="/styles/auth_reg.css">
    <link rel="icon" href="/assets/logo.png">
</head>
<body>

    <!-- Back to home -->
    <a class="auth-back" href="/">← Home</a>

    <!-- Theme toggle -->
    <button class="auth-theme-toggle" id="themeToggleBtn" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="auth-page">

        <!-- Brand -->
        <div class="auth-brand">
            <img src="/assets/logo.png" alt="Meetify" class="auth-brand-logo-img">
        </div>

        <!-- Card -->
        <div class="auth-card">
            <h1 class="auth-card-title">Create account</h1>
            <p class="auth-card-sub">Join Meetify — it's free</p>

            <div class="auth-form">
                <div class="form-group">
                    <label for="name">Display name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Ivan Petrov"
                        maxlength="100"
                        autocomplete="name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        maxlength="100"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Min 8 characters"
                        maxlength="100"
                        autocomplete="new-password"
                        required
                    >
                    <span id="password-strength"></span>
                </div>

                <div class="form-group form-group-consent">
                    <label class="consent-label">
                        <input type="checkbox" id="ageConsent" name="ageConsent">
                        <span class="consent-box"></span>
                        <span class="consent-text">I confirm that I am at least <strong>16 years old</strong></span>
                    </label>
                </div>

                <div class="form-group form-group-consent">
                    <label class="consent-label">
                        <input type="checkbox" id="consent" name="consent">
                        <span class="consent-box"></span>
                        <span class="consent-text">
                            I agree to the
                            <a href="/legal/terms.html" target="_blank">Terms of Service</a>
                            and
                            <a href="/legal/privacy.html" target="_blank">Privacy Policy</a>
                        </span>
                    </label>
                </div>

                <button class="auth-submit" id="submit">Create Account</button>

                <!-- Inline message instead of alert() -->
                <div class="auth-message" id="authMessage"></div>
            </div>

            <!-- Footer links -->
            <div class="auth-footer">
                <div class="auth-footer-row">
                    <span>Already have an account?</span>
                    <button class="auth-footer-btn" id="authb">Sign in</button>
                </div>
            </div>
        </div>

        <div class="page-footer">
            <p>© 2026 Meetify · <a href="/">Home</a></p>
        </div>

    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/reg.js"></script>
    <script src="/err/error-logger.js"></script>
</body>
</html>
