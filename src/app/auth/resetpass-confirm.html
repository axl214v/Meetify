<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — Meetify</title>
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
    <link rel="stylesheet" href="/styles/brand.css">
    <link rel="stylesheet" href="/styles/auth_reg.css">
    <link rel="icon" href="/assets/logo-mark.png">
</head>
<body>

    <button class="auth-theme-toggle" id="themeToggleBtn" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="auth-page">

        <div class="auth-brand">
            <img src="/assets/logo.png" alt="Meetify" class="auth-brand-logo-img">
        </div>

        <!-- Invalid/expired token -->
        <div class="auth-card" id="invalidBlock" style="display:none;">
            <div style="text-align:center;padding:1rem 0;">
                <div style="font-size:2.5rem;margin-bottom:1rem;">⚠️</div>
                <h1 class="auth-card-title">Link expired</h1>
                <p class="auth-card-sub">This reset link is invalid or has expired.<br>Please request a new one.</p>
            </div>
            <div class="auth-footer">
                <div class="auth-footer-row">
                    <button class="auth-footer-btn" onclick="window.location.href='/auth/resetpass.html'">
                        Request new link
                    </button>
                </div>
            </div>
        </div>

        <!-- Set new password form -->
        <div class="auth-card" id="confirmCard" style="display:none;">
            <h1 class="auth-card-title">Set new password</h1>
            <p class="auth-card-sub">Choose a strong password for your account</p>

            <div class="auth-form">
                <div class="form-group">
                    <label for="newPassword">New password</label>
                    <input
                        type="password"
                        id="newPassword"
                        placeholder="Min 8 characters"
                        maxlength="100"
                        autocomplete="new-password"
                        required
                    >
                    <span id="password-strength"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Repeat password"
                        maxlength="100"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <button class="auth-submit" id="submitBtn">Set New Password</button>
                <div class="auth-message" id="confirmMessage"></div>
            </div>

            <div class="auth-footer">
                <div class="auth-footer-row">
                    <span>Remembered your password?</span>
                    <button class="auth-footer-btn" onclick="window.location.href='/auth/Auth.html'">Sign in</button>
                </div>
            </div>
        </div>

        <!-- Loading state -->
        <div class="auth-card" id="loadingBlock">
            <div style="text-align:center;padding:2rem 0;color:var(--text-2);font-size:0.9rem;">
                Validating link...
            </div>
        </div>

        <div class="page-footer">
            <p>© 2026 Meetify · <a href="/">Home</a></p>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/resetpass-confirm.js"></script>
    <script src="/err/error-logger.js"></script>
</body>
</html>
