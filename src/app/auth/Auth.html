<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetify - Authorization</title>
  <link rel="stylesheet" href="/styles/auth_reg.css">
  <link rel="icon" href="/assets/logo.png">
</head>
<body>
  <header>
    <h1>Authorization</h1>
  </header>
  
  <main>
    <section>
      <h2>Authorization Form</h2>
      <form id="auth-form">
        <div>
          <label for="email">Email:</label>
          <input type="email" maxlength="36" name="email" id="email" required>
        </div>
        <div>
          <label for="password">Password:</label>
          <input type="password" maxlength="36" name="password" id="password" required>
        </div>
        <div>
          <button type="submit" id="submit">Authorize</button>
        </div>
      </form>
    </section>
    
    <section class="auth-links">
      <div>
        <a href="/auth/Reg.html">Not registered?</a>
        <button id="authb">Register!</button>
      </div>
      <div>
        <a href="/auth/resetpass.html">Forgot password?</a>
        <button id="reset">Reset it!</button>
      </div>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2024 Meetify. All rights reserved.</p>
  </footer>
  
  <script src="/js/auth.js"></script>
  <script src="/err/error-logger.js"></script>
  <noscript>Sorry, your browser does not support JavaScript.</noscript>
</body>
</html>
