<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Meetify</title>
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
    <link rel="preload" href="/assets/fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/assets/fonts/fonts.css">
    <link rel="stylesheet" href="/styles/brand.css">
    <link rel="stylesheet" href="/styles/auth_reg.css">
    <link rel="icon" href="/assets/logo-mark.png">
</head>
<body>

    <!-- Back to home -->
    <a class="auth-back" href="/">← Home</a>

    <!-- Theme toggle -->
    <button class="auth-theme-toggle" id="themeToggleBtn" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="auth-page">

        <!-- Brand -->
        <div class="auth-brand">
            <img src="/assets/logo.png" alt="Meetify" class="auth-brand-logo-img">
        </div>

        <!-- Card -->
        <div class="auth-card">
            <h1 class="auth-card-title">Welcome back</h1>
            <p class="auth-card-sub">Sign in to your account to continue</p>

            <div class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        maxlength="100"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        maxlength="100"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button class="auth-submit" id="submit">Sign In</button>

                <!-- Inline error message instead of alert() -->
                <div class="auth-message" id="authMessage"></div>
            </div>

            <!-- Footer links -->
            <div class="auth-footer">
                <div class="auth-footer-row">
                    <span>Don't have an account?</span>
                    <button class="auth-footer-btn" id="authb">Create account</button>
                </div>
                <div class="auth-footer-row">
                    <a href="/auth/resetpass.html">Forgot password?</a>
                </div>
            </div>
        </div>

        <div class="page-footer">
            <p>© 2026 Meetify · <a href="/">Home</a></p>
        </div>

    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/err/error-logger.js"></script>
</body>
</html>
