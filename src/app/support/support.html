<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support — Meetify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/styles.css">
    <script>
        (function() {
            const t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: 'Outfit', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* Nav */
        .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-weight: 700; font-size: 17px; }
        .nav-logo-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #fff; }
        .nav-actions { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 7px 16px; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); text-decoration: none; transition: border-color 0.15s, background 0.15s; }
        .btn:hover { border-color: var(--accent); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { opacity: 0.88; }

        /* Layout */
        .page { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; flex: 1; width: 100%; }

        /* Header */
        .page-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; gap: 16px; flex-wrap: wrap; }
        .page-hd h1 { font-size: 24px; font-weight: 700; }
        .page-hd p { font-size: 13px; color: var(--text2); margin-top: 4px; }

        /* New ticket form */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .card + .card { margin-top: 14px; }
        .card-hd { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .card-hd h2 { font-size: 14px; font-weight: 600; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .form-full { grid-column: 1 / -1; }
        .form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
        .form-input { width: 100%; padding: 9px 12px; border-radius: 9px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 13px; transition: border-color 0.15s; }
        .form-input:focus { outline: none; border-color: var(--accent); }
        textarea.form-input { resize: vertical; min-height: 100px; }
        .form-actions { padding: 0 20px 20px; display: flex; gap: 10px; }

        /* Tickets list */
        .tickets-list { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
        .ticket-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--text); transition: border-color 0.15s, transform 0.12s; cursor: pointer; }
        .ticket-card:hover { border-color: var(--accent); transform: translateX(2px); }
        .ticket-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .ticket-status.open        { background: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .ticket-status.in_progress { background: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
        .ticket-status.closed      { background: var(--text3); }
        .ticket-info { flex: 1; min-width: 0; }
        .ticket-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ticket-meta { font-size: 11px; color: var(--text3); margin-top: 3px; display: flex; gap: 10px; }
        .ticket-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0; }
        .badge-open        { background: rgba(59,130,246,0.12);  color: #3b82f6; }
        .badge-in_progress { background: rgba(245,158,11,0.12);  color: #f59e0b; }
        .badge-closed      { background: rgba(128,128,128,0.12); color: var(--text3); }
        .ticket-replies { font-size: 11px; color: var(--text3); flex-shrink: 0; }
        .ticket-arrow { color: var(--text3); font-size: 13px; flex-shrink: 0; }

        /* Empty state */
        .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }
        .empty p { font-size: 14px; }

        /* Auth wall */
        .auth-wall { text-align: center; padding: 80px 20px; }
        .auth-wall h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .auth-wall p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }

        /* Toggle */
        .new-ticket-wrap { display: none; }
        .new-ticket-wrap.open { display: block; }

        @media (max-width: 560px) {
            .nav { padding: 12px 16px; }
            .page { padding: 24px 16px 60px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a class="nav-logo" href="/">
        <div class="nav-logo-mark">M</div>
        Meetify
    </a>
    <div class="nav-actions">
        <a class="btn" href="/Conf/pages/conf.html">Conferences</a>
        <a class="btn btn-primary" href="/auth/Auth.html" id="navAuthBtn">Sign In</a>
    </div>
</nav>

<div class="page">

    <!-- Auth wall (shown when not logged in) -->
    <div class="auth-wall" id="authWall">
        <div class="empty-icon">🔐</div>
        <h2>Sign in to access support</h2>
        <p>You need an account to create and view support tickets.</p>
        <a class="btn btn-primary" href="/auth/Auth.html">Sign In</a>
    </div>

    <!-- Ticket list (shown when logged in) -->
    <div id="ticketsView" style="display:none;">
        <div class="page-hd">
            <div>
                <h1>Support</h1>
                <p>Your support tickets</p>
            </div>
            <button class="btn btn-primary" id="newTicketToggle">+ New Ticket</button>
        </div>

        <!-- New ticket form -->
        <div class="new-ticket-wrap" id="newTicketWrap">
            <div class="card">
                <div class="card-hd">
                    <h2>New Ticket</h2>
                    <button class="btn" id="cancelTicket" style="padding:4px 12px;font-size:12px;">Cancel</button>
                </div>
                <div class="form-grid">
                    <div class="form-full">
                        <label class="form-label">Title</label>
                        <input class="form-input" type="text" id="ticketTitle" placeholder="Brief description of your issue" maxlength="255">
                    </div>
                    <div>
                        <label class="form-label">Category</label>
                        <select class="form-input" id="ticketCategory">
                            <option value="technical">Technical Problem</option>
                            <option value="account">Account</option>
                            <option value="general">General Question</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-full">
                        <label class="form-label">Message</label>
                        <textarea class="form-input" id="ticketMessage" placeholder="Describe your issue in detail..." maxlength="5000"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" id="submitTicket">Submit Ticket</button>
                </div>
            </div>
        </div>

        <!-- Tickets list -->
        <div class="tickets-list" id="ticketsList">
            <div class="empty"><div class="empty-icon">📭</div><p>Loading tickets...</p></div>
        </div>
    </div>

</div>

<script src="/js/theme.js"></script>
<script src="support.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
<script src="/js/notifications.js"></script>
</body>
</html>
