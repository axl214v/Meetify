<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support — Meetify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')})();</script>
    <style>
        :root,[data-theme="dark"]{
            --bg:#080c14;--bg2:#0d1220;--surface:#161d2e;--surface2:#1c2540;
            --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
            --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
            --accent:#3b82f6;--accent2:#6366f1;--accent-rgb:59,130,246;
            --danger:#ef4444;--success:#10b981;--warn:#f59e0b;
        }
        [data-theme="light"]{
            --bg:#f1f5f9;--bg2:#fff;--surface:#fff;--surface2:#f8fafc;
            --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.14);
            --text:#1e293b;--text2:#64748b;--text3:#94a3b8;
            --accent:#3b82f6;--accent2:#6366f1;--accent-rgb:59,130,246;
            --danger:#ef4444;--success:#10b981;--warn:#f59e0b;
        }

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{color-scheme:dark light}
        body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

        /* ── Nav ── */
        .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:20}
        .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-weight:700;font-size:17px}
        .nav-logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;box-shadow:0 0 12px rgba(var(--accent-rgb),.35)}
        .nav-links{display:flex;gap:8px;align-items:center}
        .nav-btn{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);text-decoration:none;transition:color .15s,border-color .15s,background .15s}
        .nav-btn:hover{color:var(--text);border-color:var(--border2)}
        .nav-btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
        .nav-btn-primary:hover{opacity:.88}

        /* ── Page ── */
        .page{max-width:800px;margin:0 auto;padding:40px 24px 80px;flex:1;width:100%}

        /* ── Page header ── */
        .page-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap}
        .page-hd h1{font-size:22px;font-weight:700}
        .page-hd p{font-size:13px;color:var(--text3);margin-top:3px}

        /* ── Create form ── */
        .form-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px;display:none}
        .form-card.open{display:block}
        .form-card-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
        .form-card-hd h2{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
        .form-body{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .form-full{grid-column:1/-1}
        .form-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
        .form-input{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;transition:border-color .15s}
        .form-input:focus{outline:none;border-color:var(--accent)}
        select.form-input{cursor:pointer}
        textarea.form-input{resize:vertical;min-height:100px}
        .form-footer{padding:0 18px 18px;display:flex;gap:8px}

        /* ── Btn ── */
        .btn{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:border-color .15s,background .15s}
        .btn:hover{border-color:var(--border2)}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
        .btn-primary:hover:not(:disabled){background:rgba(59,130,246,.85)}
        .btn-sm{padding:5px 12px;font-size:12px}

        /* ── Tickets list ── */
        .tickets-wrap h2{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
        .ticket-list{display:flex;flex-direction:column;gap:8px}
        .ticket-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text);transition:border-color .15s,transform .12s}
        .ticket-row:hover{border-color:var(--accent);transform:translateX(3px)}
        .t-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .t-dot.open{background:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.18)}
        .t-dot.in_progress{background:var(--warn);box-shadow:0 0 0 3px rgba(245,158,11,.18)}
        .t-dot.closed{background:var(--text3)}
        .t-info{flex:1;min-width:0}
        .t-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .t-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:10px}
        .t-badge{padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
        .b-open{background:rgba(var(--accent-rgb),.12);color:var(--accent)}
        .b-in_progress{background:rgba(245,158,11,.12);color:var(--warn)}
        .b-closed{background:rgba(128,128,128,.1);color:var(--text3)}
        .t-replies{font-size:11px;color:var(--text3);flex-shrink:0}
        .t-arrow{font-size:12px;color:var(--text3);flex-shrink:0}

        /* ── Empty / auth wall ── */
        .empty{text-align:center;padding:60px 20px;color:var(--text3)}
        .empty-icon{font-size:36px;margin-bottom:12px}
        .empty p{font-size:14px;margin-bottom:20px}

        .auth-wall{text-align:center;padding:100px 20px}
        .auth-wall .icon{width:60px;height:60px;background:rgba(var(--accent-rgb),.1);border:1px solid rgba(var(--accent-rgb),.2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px}
        .auth-wall h2{font-size:20px;font-weight:700;margin-bottom:8px}
        .auth-wall p{font-size:14px;color:var(--text2);margin-bottom:24px}

        @media(max-width:560px){
            .nav{padding:12px 16px}
            .page{padding:24px 16px 60px}
            .form-body{grid-template-columns:1fr}
        }
    </style>
</head>
<body>

<nav class="nav">
    <a class="nav-logo" href="/">
        <div class="nav-logo-mark">M</div>
        Meetify
    </a>
    <div class="nav-links">
        <a class="nav-btn" href="/Conf/pages/conf.html">Conferences</a>
        <a class="nav-btn nav-btn-primary" href="/auth/Auth.html" id="navAuthBtn">Sign In</a>
    </div>
</nav>

<div class="page">

    <!-- Auth wall -->
    <div class="auth-wall" id="authWall" style="display:none">
        <div class="icon">🔐</div>
        <h2>Sign in to access support</h2>
        <p>Create and view your support tickets after signing in.</p>
        <a class="btn btn-primary" href="/auth/Auth.html">Sign In</a>
    </div>

    <!-- Ticket list -->
    <div id="ticketsView" style="display:none">
        <div class="page-hd">
            <div>
                <h1>Support</h1>
                <p>Your support tickets</p>
            </div>
            <button class="btn btn-primary" id="btnNewTicket">+ New Ticket</button>
        </div>

        <!-- Create form -->
        <div class="form-card" id="formCard">
            <div class="form-card-hd">
                <h2>New Ticket</h2>
                <button class="btn btn-sm" id="btnCancelForm">Cancel</button>
            </div>
            <div class="form-body">
                <div class="form-full">
                    <label class="form-label">Title</label>
                    <input class="form-input" type="text" id="fTitle" placeholder="Brief description of your issue" maxlength="255">
                </div>
                <div>
                    <label class="form-label">Category</label>
                    <select class="form-input" id="fCategory">
                        <option value="technical">Technical Problem</option>
                        <option value="account">Account</option>
                        <option value="general">General Question</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-full">
                    <label class="form-label">Message</label>
                    <textarea class="form-input" id="fMessage" placeholder="Describe your issue in detail..." maxlength="5000"></textarea>
                </div>
            </div>
            <div class="form-footer">
                <button class="btn btn-primary" id="btnSubmitForm">Submit Ticket</button>
            </div>
        </div>

        <!-- List -->
        <div class="tickets-wrap">
            <h2>Your Tickets</h2>
            <div class="ticket-list" id="ticketList">
                <div class="empty"><div class="empty-icon">⋯</div><p>Loading...</p></div>
            </div>
        </div>
    </div>

</div>

<script src="/js/theme.js"></script>
<script src="support.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
<script src="/js/notifications.js"></script>
</body>
</html>
