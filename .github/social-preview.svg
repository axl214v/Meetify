<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="25%" cy="55%" r="65%" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(0,0) scale(1280,640)">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#020c1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="40%" r="55%" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(0,0) scale(1280,640)">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#020c1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e40af" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#020c1a"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <rect width="1280" height="640" fill="url(#g1)"/>
  <rect width="1280" height="640" fill="url(#g2)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="640" fill="url(#lineGrad)"/>

  <!-- Logo mark — video camera shape -->
  <g transform="translate(520, 170)">
    <!-- Camera body -->
    <rect x="0" y="14" width="60" height="44" rx="8" fill="none" stroke="url(#lineGrad)" stroke-width="3"/>
    <!-- Camera lens -->
    <circle cx="25" cy="36" r="14" fill="none" stroke="url(#lineGrad)" stroke-width="3"/>
    <circle cx="25" cy="36" r="6" fill="url(#lineGrad)" opacity="0.6"/>
    <!-- Camera viewfinder triangle -->
    <path d="M64 22 L82 32 L64 42 Z" fill="url(#lineGrad)" opacity="0.9"/>
  </g>

  <!-- Meetify wordmark -->
  <text x="640" y="285"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="800"
        font-size="108"
        letter-spacing="-3"
        fill="white">Meetify</text>

  <!-- Gradient underline -->
  <rect x="420" y="300" width="440" height="3" rx="1.5" fill="url(#lineGrad)"/>

  <!-- Subtitle -->
  <text x="640" y="366"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="400"
        font-size="28"
        fill="#94a3b8"
        letter-spacing="0.3">Open-source privacy-focused video conferencing</text>

  <!-- Tags -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="500">
    <!-- WebRTC -->
    <rect x="310" y="410" width="110" height="34" rx="17" fill="#1e3a5f" opacity="0.85"/>
    <text x="365" y="432" text-anchor="middle" fill="#60a5fa">WebRTC</text>

    <!-- Self-hosted -->
    <rect x="434" y="410" width="140" height="34" rx="17" fill="#1e3a5f" opacity="0.85"/>
    <text x="504" y="432" text-anchor="middle" fill="#60a5fa">Self-hosted</text>

    <!-- P2P + SFU -->
    <rect x="588" y="410" width="120" height="34" rx="17" fill="#1e3a5f" opacity="0.85"/>
    <text x="648" y="432" text-anchor="middle" fill="#60a5fa">P2P + SFU</text>

    <!-- Privacy -->
    <rect x="722" y="410" width="110" height="34" rx="17" fill="#1e3a5f" opacity="0.85"/>
    <text x="777" y="432" text-anchor="middle" fill="#60a5fa">Privacy</text>

    <!-- Docker -->
    <rect x="846" y="410" width="110" height="34" rx="17" fill="#1e3a5f" opacity="0.85"/>
    <text x="901" y="432" text-anchor="middle" fill="#60a5fa">Docker</text>
  </g>

  <!-- Domain -->
  <text x="640" y="558"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22"
        font-weight="300"
        fill="#475569"
        letter-spacing="2">meetify.cc</text>

  <!-- Bottom accent line -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#lineGrad)"/>
</svg>
