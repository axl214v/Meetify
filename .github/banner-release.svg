<svg viewBox="0 0 1280 640" width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background glows -->
    <radialGradient id="gLeft" cx="0%" cy="50%" r="80%" gradientUnits="userSpaceOnUse"
                    x1="0" y1="0" x2="1280" y2="640">
      <stop offset="0%"   stop-color="#2563eb" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#020c1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gRight" cx="100%" cy="40%" r="60%" gradientUnits="userSpaceOnUse"
                    x1="0" y1="0" x2="1280" y2="640">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020c1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gMid" cx="55%" cy="100%" r="50%" gradientUnits="userSpaceOnUse"
                    x1="0" y1="0" x2="1280" y2="640">
      <stop offset="0%"   stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020c1a" stop-opacity="0"/>
    </radialGradient>

    <!-- Brand gradient (blue→sky) -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Dot grid -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e40af" opacity="0.18"/>
    </pattern>

    <!-- Card blur backdrop approx -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle card shadow -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1280" height="640" fill="#020c1a"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <rect width="1280" height="640" fill="url(#gLeft)"/>
  <rect width="1280" height="640" fill="url(#gRight)"/>
  <rect width="1280" height="640" fill="url(#gMid)"/>

  <!-- Edge accents -->
  <rect x="0"    y="0" width="4"    height="640" fill="url(#brand)"/>
  <rect x="0"    y="636" width="1280" height="4" fill="url(#brand)" opacity="0.5"/>

  <!-- ══════════════════════════════════════════
       LEFT COLUMN  (x 72 … 580)
       ══════════════════════════════════════════ -->

  <!-- "Meetify" wordmark -->
  <text x="72" y="232"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="800" font-size="108" letter-spacing="-3"
        fill="white">Meetify</text>

  <!-- Gradient underline -->
  <rect x="72" y="250" width="380" height="4" rx="2" fill="url(#brand)"/>

  <!-- "NEW RELEASE" pill -->
  <rect x="72" y="276" width="150" height="32" rx="16" fill="url(#brand)" opacity="0.9"/>
  <text x="147" y="298" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="12" font-weight="700" letter-spacing="2" fill="white">NEW RELEASE</text>

  <!-- Tagline -->
  <text x="72" y="380"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="20" font-weight="300" fill="#64748b" letter-spacing="0.5">
    Secure · Self-hosted · Open source
  </text>

  <!-- meetify.cc -->
  <text x="72" y="568"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="16" font-weight="300" fill="#334155" letter-spacing="2">meetify.cc</text>

  <!-- ══════════════════════════════════════════
       DIVIDER
       ══════════════════════════════════════════ -->
  <rect x="600" y="72" width="1" height="496" fill="#1e3a5f" opacity="0.7"/>

  <!-- ══════════════════════════════════════════
       VERSION BLOCK  (centred in x 600…780)
       ══════════════════════════════════════════ -->

  <text x="692" y="196" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="600" letter-spacing="4" fill="#3b82f6">VERSION</text>

  <text x="692" y="310" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="800" font-size="108" letter-spacing="-3"
        fill="white">1.4.0</text>

  <text x="692" y="358" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="26" font-weight="400" fill="#475569" letter-spacing="1">beta</text>

  <!-- ══════════════════════════════════════════
       RIGHT COLUMN — feature cards (x 800…1208)
       ══════════════════════════════════════════ -->

  <!-- Card 1 — Standalone SFU -->
  <rect x="808" y="96" width="400" height="132" rx="14"
        fill="#0d1829" stroke="#1e3a5f" stroke-width="1" filter="url(#cardShadow)"/>
  <!-- accent bar -->
  <rect x="808" y="96" width="4" height="132" rx="2" fill="url(#brand)"/>

  <!-- icon circle -->
  <circle cx="852" cy="162" r="24" fill="#0f2240"/>
  <!-- server / network icon: two stacked rects + line -->
  <rect x="838" y="150" width="28" height="10" rx="2" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <rect x="838" y="165" width="28" height="10" rx="2" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="860" cy="155" r="2" fill="#3b82f6"/>
  <circle cx="860" cy="170" r="2" fill="#60a5fa"/>

  <text x="888" y="148"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="700" fill="white">Standalone SFU</text>
  <text x="888" y="170"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="400" fill="#64748b">mediasoup on dedicated VPS</text>
  <text x="888" y="190"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="400" fill="#64748b">auto-deployed via deploy.sh</text>

  <!-- Card 2 — Error Logs tab -->
  <rect x="808" y="252" width="400" height="132" rx="14"
        fill="#0d1829" stroke="#1e3a5f" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="808" y="252" width="4" height="132" rx="2" fill="url(#brand)"/>

  <circle cx="852" cy="318" r="24" fill="#0f2240"/>
  <!-- chart / bars icon -->
  <rect x="839" y="327" width="6"  height="8"  rx="1" fill="#3b82f6"/>
  <rect x="849" y="319" width="6"  height="16" rx="1" fill="#60a5fa"/>
  <rect x="859" y="312" width="6"  height="23" rx="1" fill="#93c5fd"/>

  <text x="888" y="304"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="700" fill="white">Admin Error Logs</text>
  <text x="888" y="326"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="400" fill="#64748b">stats · sparkline · top errors</text>
  <text x="888" y="346"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="400" fill="#64748b">separate module, filterable</text>

  <!-- Card 3 — Status monitoring -->
  <rect x="808" y="408" width="400" height="132" rx="14"
        fill="#0d1829" stroke="#1e3a5f" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="808" y="408" width="4" height="132" rx="2" fill="url(#brand)"/>

  <circle cx="852" cy="474" r="24" fill="#0f2240"/>
  <!-- pulse / status dot icon -->
  <circle cx="852" cy="474" r="8" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="852" cy="474" r="3" fill="#10b981"/>
  <circle cx="852" cy="474" r="14" fill="none" stroke="#10b981" stroke-width="1" opacity="0.35"/>

  <text x="888" y="460"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="700" fill="white">Status Monitoring</text>
  <text x="888" y="482"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="400" fill="#64748b">health.meetify.cc strip on landing</text>
  <text x="888" y="502"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="400" fill="#64748b">22 Dependabot alerts patched</text>
</svg>
